name: Auto Draft Artikel (AI)

on:
  # Jadwal otomatis: Senin–Sabtu pukul 08:17 WIB (01:17 UTC).
  # Menit ganjil (:17) agar tak bentrok beban puncak GitHub di menit :00.
  # Script memilih kategori sesuai hari (Minggu libur -> tidak jalan).
  schedule:
    - cron: "17 1 * * 1-6"
  # Bisa juga dijalankan manual dari tab Actions.
  workflow_dispatch:
    inputs:
      jumlah:
        description: "Jumlah artikel"
        required: false
        default: "1"
      kategori:
        description: "Kategori (auto = ikut jadwal hari)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - kesehatan-hewan
          - panduan-tips
          - bisnis-hewan
          - berita-tren

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pillow

      - name: Generate draft(s)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          NUM_ARTICLES: ${{ github.event.inputs.jumlah || '1' }}
          SECTION: ${{ github.event.inputs.kategori || 'auto' }}
        run: python scripts/generate_drafts.py

      - name: Buka Pull Request untuk review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Draf artikel AI baru"
          branch: auto-draft/run-${{ github.run_id }}
          delete-branch: true
          labels: ai-draft
          title: "📝 Draf artikel AI baru — siap direview"
          body: |
            Draf artikel dibuat otomatis oleh AI (Gemini).

            **Cara review:**
            - Buka tab **Files changed** untuk membaca artikel.
            - Cocok? Klik **Merge pull request** untuk menerbitkan.
            - Tidak cocok? Klik **Close pull request** untuk menolak.

            Gambar: ilustrasi (Pixabay) untuk non-berita, foto asli (Pexels) untuk Berita & Tren.
          assignees: centralcatgrooming-svg
