name: Buat draf artikel (AI)

# Cara pakai: tab Actions -> "Buat draf artikel (AI)" -> Run workflow -> isi jumlah.
# Hasilnya berupa PULL REQUEST. Anda dapat notifikasi, tinjau artikelnya, lalu:
#   - Setuju  : klik "Merge pull request"  -> artikel TAYANG
#   - Tolak   : klik "Close pull request"  -> dibuang, tidak tayang

on:
  workflow_dispatch:
    inputs:
      jumlah:
        description: "Berapa artikel yang dibuat?"
        required: true
        default: "1"
        type: string

  # --- Jadwal otomatis (OPSIONAL) ---
  # Hapus tanda '#' di 2 baris bawah untuk menyalakan jadwal.
  # Contoh ini: tiap Senin 08.00 WIB (01:00 UTC), membuat 1 artikel.
  # schedule:
  #   - cron: "0 1 * * 1"

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pillow

      - name: Buat artikel (Gemini + Pexels)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          NUM_ARTICLES: ${{ github.event.inputs.jumlah || '1' }}
          GEMINI_MODEL: gemini-2.5-flash
        run: python scripts/generate_drafts.py

      - name: Buka Pull Request untuk ditinjau
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Tambah artikel AI (menunggu review)"
          branch: ai-drafts/run-${{ github.run_id }}
          delete-branch: true
          title: "📝 Draf artikel AI siap ditinjau"
          body: |
            Artikel ini dibuat otomatis oleh AI (Gemini) dengan foto dari Pexels.

            **Cara meninjau:**
            - Buka tab **Files changed** untuk membaca artikel & melihat foto.
            - **Setuju & terbitkan:** klik **Merge pull request** di bawah.
            - **Tolak:** klik **Close pull request**.

            Periksa terutama keakuratan (khusus topik kesehatan) sebelum Merge.

            @centralcatgrooming-svg
          labels: ai-draft
          assignees: centralcatgrooming-svg
