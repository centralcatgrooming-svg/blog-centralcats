name: Auto Draft Artikel (AI)

on:
  # Pemicu jadwal PRESISI lewat scheduler eksternal (mis. cron-job.org) yang
  # memanggil GitHub API repository_dispatch dengan event_type "auto-draft".
  # Dipakai karena cron bawaan GitHub sering telat/di-skip (best-effort).
  # Atur scheduler eksternal: Senin–Sabtu 08:17 WIB. Minggu tetap aman karena
  # script (generate_drafts.py) otomatis libur di hari Minggu (WIB).
  # Payload opsional: { "jumlah": "1", "kategori": "auto" }.
  repository_dispatch:
    types: [auto-draft]
  # Bisa juga dijalankan manual dari tab Actions.
  workflow_dispatch:
    inputs:
      jumlah:
        description: "Jumlah artikel"
        required: false
        default: "1"
      kategori:
        description: "Kategori (auto = ikut jadwal hari)"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - kesehatan-hewan
          - panduan-tips
          - bisnis-hewan
          - berita-tren

permissions:
  contents: write
  pull-requests: write

jobs:
  draft:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests pillow

      - name: Generate draft(s)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
          NUM_ARTICLES: ${{ github.event.inputs.jumlah || github.event.client_payload.jumlah || '1' }}
          SECTION: ${{ github.event.inputs.kategori || github.event.client_payload.kategori || 'auto' }}
        run: python scripts/generate_drafts.py

      - name: Buka Pull Request untuk review
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Draf artikel AI baru"
          branch: auto-draft/run-${{ github.run_id }}
          delete-branch: true
          labels: ai-draft
          title: "📝 Draf artikel AI baru — siap direview"
          body: |
            Draf artikel dibuat otomatis oleh AI (Gemini).

            **Cara review:**
            - Buka tab **Files changed** untuk membaca artikel.
            - Cocok? Klik **Merge pull request** untuk menerbitkan.
            - Tidak cocok? Klik **Close pull request** untuk menolak.

            Gambar: ilustrasi (Pixabay) untuk non-berita, foto asli (Pexels) untuk Berita & Tren.
          assignees: centralcatgrooming-svg
